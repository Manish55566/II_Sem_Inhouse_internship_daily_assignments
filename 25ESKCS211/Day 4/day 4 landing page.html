<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Landing Page</title>

<style>
 *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
    scroll-behavior:smooth;
}

body{
    background:linear-gradient(135deg,#eef2ff,#dbeafe);
    color:#222;
    transition:0.5s;
}

.dark{
    background:#121212;
    color:white;
}

nav{
    background:linear-gradient(90deg,#4f46e5,#06b6d4);
    padding:18px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

nav h2{
    color:white;
    letter-spacing:1px;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

nav ul li a:hover{
    color:#ffe600;
}

.hero{
    background-size:cover;
    background-position:center;
    color:black;
    padding:120px 20px;
    text-align:center;
}

.hero h1{
    font-size:55px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    margin-bottom:30px;
}

.hero button{
    padding:14px 30px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:30px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

.hero button:hover{
    background:#ff6f00;
    transform:scale(1.05);
}

.container{
    width:85%;
    margin:50px auto;
}

.box{
    background:rgba(255,255,255,.8);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:30px;
    margin-bottom:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    transition:.4s;
}

.box:hover{
    transform:translateY(-10px);
}

.dark .box{
    background:#2d2d2d;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    padding:12px 25px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
    transition:.3s;
}

button:hover{
    background:#3730a3;
    transform:scale(1.05);
}

.error{
    color:red;
    font-size:14px;
}

footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:50px;
}

@media(max-width:768px){

nav{
    flex-direction:column;
}

nav ul{
    margin-top:15px;
}

.hero h1{
    font-size:38px;
}

.hero p{
    font-size:18px;
}

.container{
    width:95%;
}

}
</style>

</head>
<body>

<nav>
    <h2>DAY 4 TASK</h2>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div class="hero">
    <h1>MY LANDING PAGE</h1>
    <p>Welcome to my landing page</p>

    <button onclick="toggleMode()">Dark Mode</button>
</div>

<div class="container">

<div class="box">
<h2>Click Counter</h2>

<h3 id="count">0</h3>

<button onclick="increase()">Click Me</button>

<button onclick="resetCounter()">Reset</button>

</div>

<div class="box">

<h2>Contact Form</h2>

<form onsubmit="return validateForm()">

<input type="text" id="name" placeholder="Enter Name">

<p id="nameError" class="error"></p>

<input type="text" id="email" placeholder="Enter Email">

<p id="emailError" class="error"></p>

<button type="submit">Submit</button>

</form>

</div>

</div>

<script>

let count = 0;

function increase(){
    count++;
    document.getElementById("count").innerHTML=count;
}

function resetCounter(){
    count=0;
    document.getElementById("count").innerHTML=count;
}

function toggleMode(){
    document.body.classList.toggle("dark");
}

function validateForm(){

let name=document.getElementById("name").value;

let email=document.getElementById("email").value;

document.getElementById("nameError").innerHTML="";

document.getElementById("emailError").innerHTML="";

let valid=true;

if(name==""){
document.getElementById("nameError").innerHTML="Name cannot be empty";
valid=false;
}

if(email.indexOf("@")==-1){
document.getElementById("emailError").innerHTML="Enter a valid email";
valid=false;
}

if(valid){
alert("Form Submitted Successfully");
}

return valid;

}

</script>

</body>
</html>
